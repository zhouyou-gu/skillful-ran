name: Build and Deploy

on:
  pull_request:
    paths:
      - "skills/**"
      - "schemas/**"
      - "config/**"
      - "scripts/**"
      - "marketplace/**"
      - ".github/workflows/build.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "schemas/**"
      - "config/**"
      - "scripts/**"
      - "marketplace/**"
      - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  validate-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate schemas and skill metadata
        run: python scripts/validate_skills.py

      - name: Verify install targets are resolvable
        run: python scripts/verify_install_targets.py

      - name: Build registry
        run: python scripts/build_registry.py

      - name: Build search index
        run: python scripts/build_search_index.py

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate-build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Build registry
        run: python scripts/build_registry.py

      - name: Build search index
        run: python scripts/build_search_index.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
